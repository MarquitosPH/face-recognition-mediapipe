<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Prueba Virtual — {{ glass.name }} | OptiMatch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face-aframe.prod.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; overflow:hidden; width:100vw; height:100vh; }
        .a-enter-vr, .a-orientation-modal { display:none !important; }

        /* UI flotante sobre la escena AR */
        .overlay-top {
            position:fixed; top:0; left:0; right:0; z-index:100;
            display:flex; align-items:center; justify-content:space-between;
            padding:12px 20px;
            background:linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, transparent 100%);
        }
        .overlay-top a, .overlay-top button {
            color:white; text-decoration:none; font-size:0.85rem; font-weight:600;
            padding:8px 16px; border-radius:8px; border:none; cursor:pointer;
            background:rgba(255,255,255,0.15); backdrop-filter:blur(8px);
            transition:background 0.2s;
        }
        .overlay-top a:hover, .overlay-top button:hover { background:rgba(255,255,255,0.3); }
        .overlay-logo { color:white; font-weight:700; font-size:1.1rem; }

        /* Panel lateral de lentes */
        .sidebar-panel {
            position:fixed; right:0; top:0; bottom:0; width:280px; z-index:90;
            background:rgba(255,255,255,0.95); backdrop-filter:blur(12px);
            overflow-y:auto; border-left:1px solid rgba(0,0,0,0.1);
            transform:translateX(100%); transition:transform 0.3s;
        }
        .sidebar-panel.open { transform:translateX(0); }
        .sidebar-header { padding:16px 20px; border-bottom:1px solid #e2e8f0; margin-top:50px; }
        .sidebar-header h3 { font-size:0.95rem; font-weight:700; color:#0F172A; }
        .sidebar-header p { font-size:0.78rem; color:#94A3B8; }
        .sidebar-current { padding:12px 20px; background:#EFF6FF; border-bottom:1px solid #e2e8f0; }
        .sidebar-current .name { font-weight:600; font-size:0.85rem; }
        .sidebar-current .meta { font-size:0.75rem; color:#94A3B8; }
        .glass-list { padding:8px 12px; }
        .glass-item {
            display:flex; gap:10px; align-items:center; padding:10px;
            border-radius:8px; cursor:pointer; transition:background 0.2s;
            border:2px solid transparent;
        }
        .glass-item:hover { background:#f1f5f9; }
        .glass-item.active { background:#EFF6FF; border-color:#3B82F6; }
        .glass-item img { width:48px; height:36px; border-radius:6px; object-fit:cover; }
        .glass-item .info { flex:1; min-width:0; }
        .glass-item .info .name { font-size:0.8rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .glass-item .info .meta { font-size:0.7rem; color:#94A3B8; }

        /* Panel de sliders — siempre ancho completo, sin importar sidebar */
        .sliders-panel {
            position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
            z-index:100; width: calc(100% - 40px); max-width: 900px;
            background:rgba(0,0,0,0.6); backdrop-filter:blur(8px);
            padding:14px 24px; display:flex; gap:16px; flex-wrap:wrap;
            border-radius:16px;
        }
        .slider-group { flex:1; min-width:120px; }
        .slider-group label { font-size:0.7rem; color:rgba(255,255,255,0.8); font-weight:600; display:block; margin-bottom:2px; }
        .slider-group input[type=range] { width:100%; }
        .video, canvas {
        image-rendering: -webkit-optimize-contrast; /* Mejora el contraste en navegadores basados en WebKit */
        image-rendering: crisp-edges;
        object-fit: cover !important;
        }

        .overlay-top a svg, .overlay-top button svg {
            width: 15px; height: 15px; stroke-width: 2.2;
            vertical-align: middle; margin-right: 5px;
        }
        .overlay-logo svg {
            width: 20px; height: 20px; stroke-width: 2;
            vertical-align: middle; margin-right: 6px;
        }
        .current-label svg {
            width: 15px; height: 15px; stroke-width: 2.2;
            vertical-align: middle; margin-right: 5px;
        }
        @media (max-width:768px) {
            .sidebar-panel { width:240px; }
            .sliders-panel { right:0; }
        }
    </style>
</head>
<body>
    <!-- ═══ ESCENA MINDAR — PANTALLA COMPLETA ═══ -->
    <a-scene
    id="arScene"
    mindar-face="autoStart: true; uiLoading: no; uiError: no; filterMinCF:0.001; filterBeta: 0.1; videoSettings: {width: 1920, height: 1080};"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true; logarithmicDepthBuffer: true; precision: high;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    >
        <a-assets timeout="30000">
            <a-asset-item id="headModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/sparkar/headOccluder.glb"></a-asset-item>
            <a-asset-item id="glassesModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/glasses/scene.gltf"></a-asset-item>
        </a-assets>

        <a-camera active="false" position="0 0 0"></a-camera>

        <a-light type="ambient" color="#ffffff" intensity="1.0"></a-light>
        <a-light type="directional" color="#ffffff" intensity="1.2" position="0 1 2"></a-light>
        <a-light type="directional" color="#ffffff" intensity="0.4" position="0 -1 1"></a-light>

        <!-- HEAD OCCLUDER — cráneo invisible -->
        <a-entity mindar-face-target="anchorIndex: 168">
            <a-gltf-model
                id="occluder"
                mindar-face-occluder
                position="0 -0.3 0.15"
                rotation="0 0 0"
                scale="0.065 0.065 0.065"
                src="#headModel"
            ></a-gltf-model>
        </a-entity>

        <!-- LENTES 3D -->
        <a-entity mindar-face-target="anchorIndex: 168">
            <a-gltf-model
                id="glassesEntity"
                position="{{ glass_config.position | default('0 -0.34 -0.33') }}"
                rotation="{{ glass_config.rotation | default('0 0 0') }}"
                scale="{{ glass_config.scale | default('0.064 0.064 0.064') }}"
                src="/static/models/{{ glass.model_3d }}.glb"
            ></a-gltf-model>
        </a-entity>
    </a-scene>

    <!-- ═══ UI FLOTANTE ═══ -->

    <!-- Barra superior -->
    <div class="overlay-top">
        <span class="overlay-logo"><i data-lucide="glasses"></i>OptiMatch</span>
        <div style="display:flex;gap:8px;">
            <a href="/detalle/{{ glass.id }}"><i data-lucide="arrow-left"></i>Volver</a>
            <a href="/"><i data-lucide="home"></i>Inicio</a>
            <button onclick="toggleSidebar()"><i data-lucide="menu"></i>Modelos</button>
        </div>
    </div>

    <!-- Nombre del lente actual -->
    <div style="position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:100;
                background:rgba(0,0,0,0.6);color:white;padding:8px 24px;border-radius:20px;
                font-size:0.85rem;font-weight:600;backdrop-filter:blur(8px);" class="current-label">
        <i data-lucide="glasses"></i><span id="currentGlassName">{{ glass.name }}</span>
    </div>

    <!-- Sidebar de modelos -->
    <div class="sidebar-panel" id="sidebarPanel">
        <div class="sidebar-header">
            <h3>Probando ahora</h3>
            <p>Selecciona otro modelo</p>
        </div>
        <div class="sidebar-current">
            <div class="name" id="currentName">{{ glass.name }}</div>
            <div class="meta">{{ glass.brand }} · {{ glass.style }} · {{ glass.material }}</div>
        </div>
        <div class="glass-list">
            {% for g in all_glasses %}
            <div class="glass-item {% if g.id == glass.id %}active{% endif %}"
                 data-glass-id="{{ g.id }}" data-glass-name="{{ g.name }}"
                 data-glass-image="{{ g.image }}" data-glass-model="{{ g.model_3d }}"
                 onclick="selectGlass(this)">
                <img src="{{ g.image }}" alt="{{ g.name }}">
                <div class="info">
                    <div class="name">{{ g.name }}</div>
                    <div class="meta">{{ g.brand }} · {{ g.style }}</div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <!-- Sliders de ajuste -->
<!-- Sliders de ajuste -->
<div class="sliders-panel">
    <div class="slider-group">
        <label>Escala: <span id="valScale">1</span></label>
        <input type="range" id="sliderScale" min="0.001" max="800" step="0.001" value="0.5" oninput="adjustGlasses()">
    </div>
    <div class="slider-group">
        <label>Y (arriba/abajo): <span id="valY">0</span></label>
        <input type="range" id="sliderY" min="-3" max="3" step="0.01" value="0" oninput="adjustGlasses()">
    </div>
    <div class="slider-group">
        <label>Z (profundidad): <span id="valZ">0</span></label>
        <input type="range" id="sliderZ" min="-3" max="3" step="0.01" value="0" oninput="adjustGlasses()">
    </div>
    <div class="slider-group">
        <label>X (izq/der): <span id="valX">0</span></label>
        <input type="range" id="sliderX" min="-3" max="3" step="0.01" value="0" oninput="adjustGlasses()">
    </div>
    <div class="slider-group" style="display:flex;flex-direction:column;justify-content:flex-end;">
        <button id="btnGuardar" onclick="guardarConfig()" style="
            padding:8px 16px; background:#2563eb; color:white; border:none;
            border-radius:8px; cursor:pointer; font-size:0.8rem; font-weight:600;
            white-space:nowrap;">
            💾 Guardar
        </button>
        <span id="saveMsg" style="display:none;color:#22c55e;font-size:0.7rem;text-align:center;margin-top:4px;">
            ✓ Guardado
        </span>
    </div>
</div>
    <script>
    // ═══════════════════════════════════════════════════════
    // OptiMatch — MindAR Full-Screen + Head Occluder
    // ═══════════════════════════════════════════════════════

    let currentModelName = '{{ glass.model_3d }}';
    let currentGlassId   = '{{ glass.id }}';

    // ── CONFIGS ORIGINALES (referencia, NO borrar) ──────────
    // const GLASS_CONFIGS_ORIGINAL = {
    //     LentesPrueba1:  { scale:"0.064 0.064 0.064",      position:"0 -0.34 -0.33",    rotation:"0 0 0"     },
    //     LentesAviador:  { scale:"700 700 700",             position:"0 0 0",             rotation:"0 0 0"     },
    //     Browline:       { scale:"0.5 0.5 0.5",             position:"0 0.07 -0.44",      rotation:"0 0 0"     },  // classic oval
    //     CatEye:         { scale:"3.66 3.66 3.66",          position:"0 -0.09 0.07",      rotation:"0 0 0"     },
    //     GruesoDecorado: { scale:"1.85 1.85 1.85",          position:"0 0.4 -0.31",       rotation:"0 180 0"   },  // elegance frame
    //     redondos:       { scale:"0.05 0.05 0.05",          position:"-0.04 -0.19 -0.25", rotation:"0 90 0"    },
    //     square:         { scale:"1 1 1",                   position:"-0.75 -1 0.75",     rotation:"-10 70 0"  },  // titanium air
    //     square2:        { scale:"0.7 0.7 0.7",             position:"-0.03 0.10 -0.33",  rotation:"0 0 0"     },  // modern square
    // };
    // ────────────────────────────────────────────────────────

    const GLASS_CONFIGS = {
        LentesPrueba1:  { scale:"0.064 0.064 0.064",      position:"0 -0.34 -0.33",    rotation:"0 0 0"    },
        LentesAviador:  { scale:"700 700 700",             position:"0 0 0",             rotation:"0 0 0"    },
        Browline:       { scale:"0.5 0.5 0.5",             position:"0 -0.03 -0.44",     rotation:"0 0 0"    },  // classic oval
        CatEye:         { scale:"3.66 3.66 3.66",          position:"0 -0.16 0.07",      rotation:"0 0 0"    },
        GruesoDecorado: { scale:"1.85 1.85 1.85",          position:"-0.03 0.06 -0.29",  rotation:"0 180 0"  },  // elegance frame
        redondos:       { scale:"0.06 0.06 0.06",          position:"-0.02 -0.19 -0.25", rotation:"0 96 0"   },
        square:         { scale:"1.075 1.075 1.075",       position:"0.5 -1.1 -1.3",     rotation:"-9 -115 0"},  // titanium air
        square2:        { scale:"0.742 0.742 0.742",       position:"-0.03 0.6 -0.35",   rotation:"0 0 0"    },  // modern square
    };
    const DEFAULT_CONFIG = { scale:"0.01 0.01 0.01", position:"0 0 0.05", rotation:"0 0 0" };
    function getConfig(n) { return GLASS_CONFIGS[n] || DEFAULT_CONFIG; }

    // ── CACHÉ DE CONFIGS GUARDADAS ───────────────────────────
    // Se pre-carga al inicio con todos los lentes para evitar
    // fetches lentos al cambiar, y se actualiza al guardar.
    // Formato: { "glass_id": { scale, x, y, z } | null }
    const configCache = {};

    // Inyectar la config del lente inicial (ya la tiene el servidor)
    {% if saved_config and saved_config.cfg_scale is not none %}
    configCache['{{ glass.id }}'] = {
        scale: {{ saved_config.cfg_scale }},
        x:     {{ saved_config.cfg_x }},
        y:     {{ saved_config.cfg_y }},
        z:     {{ saved_config.cfg_z }}
    };
    {% else %}
    configCache['{{ glass.id }}'] = null;
    {% endif %}

    // Carga config del servidor para un id (usa caché si ya se tiene)
    async function fetchConfig(id) {
        if (id in configCache) return configCache[id];
        try {
            const res  = await fetch(`/api/glasses/${id}/config`);
            const data = await res.json();
            configCache[id] = (data && data.cfg_scale !== null && data.cfg_scale !== undefined)
                ? { scale: data.cfg_scale, x: data.cfg_x, y: data.cfg_y, z: data.cfg_z }
                : null;
        } catch {
            configCache[id] = null;
        }
        return configCache[id];
    }

    // Pre-carga configs de todos los lentes en background al cargar la página
    function preloadAllConfigs() {
        document.querySelectorAll('.glass-item').forEach(el => {
            const id = el.dataset.glassId;
            if (id && !(id in configCache)) fetchConfig(id);
        });
    }
    // ────────────────────────────────────────────────────────

    // Aplica valores a los sliders y actualiza el lente en pantalla
    function applyToSliders(scale, x, y, z) {
        document.getElementById('sliderScale').value = scale;
        document.getElementById('sliderX').value     = x;
        document.getElementById('sliderY').value     = y;
        document.getElementById('sliderZ').value     = z;
        adjustGlasses();
    }

    function adjustGlasses() {
        const e = document.getElementById('glassesEntity');
        if (!e) return;
        const s = parseFloat(document.getElementById('sliderScale').value);
        const y = parseFloat(document.getElementById('sliderY').value);
        const z = parseFloat(document.getElementById('sliderZ').value);
        const x = parseFloat(document.getElementById('sliderX').value);
        e.setAttribute('scale',    `${s} ${s} ${s}`);
        e.setAttribute('position', `${x} ${y} ${z}`);
        document.getElementById('valScale').textContent = s.toFixed(3);
        document.getElementById('valY').textContent     = y.toFixed(2);
        document.getElementById('valZ').textContent     = z.toFixed(2);
        document.getElementById('valX').textContent     = x.toFixed(2);
    }

    // Guarda la config del lente activo en DB y actualiza el caché
    function guardarConfig() {
        const scale = parseFloat(document.getElementById('sliderScale').value);
        const y     = parseFloat(document.getElementById('sliderY').value);
        const z     = parseFloat(document.getElementById('sliderZ').value);
        const x     = parseFloat(document.getElementById('sliderX').value);

        // Actualizar caché local inmediatamente
        configCache[currentGlassId] = { scale, x, y, z };

        fetch(`/api/glasses/${currentGlassId}/config`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ scale, x, y, z })
        })
        .then(r => r.json())
        .then(() => {
            const msg = document.getElementById('saveMsg');
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 2000);
        });
    }

    // Cambia de lente. Usa caché para config, y re-aplica tras model-loaded
    // porque A-Frame puede pisar los atributos al terminar de cargar el .glb
    async function selectGlass(el) {
        document.querySelectorAll('.glass-item').forEach(o => o.classList.remove('active'));
        el.classList.add('active');
        const name  = el.dataset.glassName;
        const model = el.dataset.glassModel;
        const id    = el.dataset.glassId;

        document.getElementById('currentGlassName').textContent = name;
        document.getElementById('currentName').textContent      = name;

        if (!model) return;
        currentModelName = model;
        currentGlassId   = id;

        const e   = document.getElementById('glassesEntity');
        const cfg = getConfig(model);
        e.setAttribute('rotation', cfg.rotation);

        // Resolver config: caché → DB → hardcodeada
        const saved = await fetchConfig(id);
        let tScale, tX, tY, tZ;
        if (saved) {
            tScale = saved.scale; tX = saved.x; tY = saved.y; tZ = saved.z;
        } else {
            const pos = cfg.position.split(' ').map(Number);
            tScale = parseFloat(cfg.scale.split(' ')[0]);
            tX = pos[0]; tY = pos[1]; tZ = pos[2];
        }

        // Cambiar modelo y aplicar config al instante en los sliders
        e.setAttribute('gltf-model', `/static/models/${model}.glb`);
        applyToSliders(tScale, tX, tY, tZ);

        // Re-aplicar DESPUÉS de que A-Frame termine de cargar el .glb
        // (A-Frame puede resetear position/scale al swapear el modelo)
        e.addEventListener('model-loaded', function reapply() {
            e.removeEventListener('model-loaded', reapply);
            applyToSliders(tScale, tX, tY, tZ);
        });

        history.replaceState(null, '', `/prueba-virtual/${id}`);
    }

    function captureSnapshot() {
        const s = document.getElementById('arScene');
        if (!s || !s.canvas) { alert('Espera a que cargue'); return; }
        const a = document.createElement('a');
        a.download = `OptiMatch-${Date.now()}.png`;
        a.href     = s.canvas.toDataURL('image/png');
        a.click();
    }

    function toggleSidebar() {
        document.getElementById('sidebarPanel').classList.toggle('open');
    }

    // Sobreescribir getUserMedia para pedir mejor calidad de cámara
    const originalGetUserMedia = navigator.mediaDevices.getUserMedia.bind(navigator.mediaDevices);
    navigator.mediaDevices.getUserMedia = (constraints) => {
        if (constraints.video) {
            constraints.video = {
                ...constraints.video,
                width: { ideal: 1920 }, height: { ideal: 1080 },
                frameRate: { ideal: 30 }, facingMode: 'user'
            };
        }
        return originalGetUserMedia(constraints);
    };

    // Al cargar: inicializar iconos, aplicar config del lente inicial,
    // y pre-cargar configs del resto de lentes en background
    window.addEventListener('load', function() {
        if (window.lucide) lucide.createIcons();

        // Aplicar config inicial (ya está en caché desde el servidor)
        const initSaved = configCache['{{ glass.id }}'];
        if (initSaved) {
            applyToSliders(initSaved.scale, initSaved.x, initSaved.y, initSaved.z);
        } else {
            const initCfg = getConfig('{{ glass.model_3d }}');
            const initPos = initCfg.position.split(' ').map(Number);
            applyToSliders(parseFloat(initCfg.scale.split(' ')[0]), initPos[0], initPos[1], initPos[2]);
        }

        // Re-aplicar cuando el modelo inicial termine de cargar
        const initEntity = document.getElementById('glassesEntity');
        if (initEntity) {
            initEntity.addEventListener('model-loaded', function reapplyInit() {
                initEntity.removeEventListener('model-loaded', reapplyInit);
                const s = configCache['{{ glass.id }}'];
                if (s) {
                    applyToSliders(s.scale, s.x, s.y, s.z);
                } else {
                    const c = getConfig('{{ glass.model_3d }}');
                    const p = c.position.split(' ').map(Number);
                    applyToSliders(parseFloat(c.scale.split(' ')[0]), p[0], p[1], p[2]);
                }
            });
        }

        // Pre-cargar configs del resto en background
        preloadAllConfigs();
        console.log('[OptiMatch] cargado — modelo:', currentModelName, '| id:', currentGlassId);
    });
    </script>
</body>
</html>
