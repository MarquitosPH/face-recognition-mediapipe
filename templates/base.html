<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OptiMatch{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">

    <!-- Ajustes globales para iconos Lucide -->
    <style>
        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 4px;
        }
        .logo-icon svg {
            width: 22px;
            height: 22px;
            stroke-width: 2;
            color: var(--primary, #2563eb);
        }
        /* Evita el "flash" mientras Lucide procesa los <i data-lucide> */
        [data-lucide]:not(svg) {
            display: inline-block;
            width: 1em;
            height: 1em;
        }
    </style>

    {% block head %}{% endblock %}
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <span class="logo-icon"><i data-lucide="glasses"></i></span>
                <span class="logo-text">OptiMatch</span>
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link">Inicio</a>
                <a href="/analisis" class="nav-link">Análisis</a>
                <a href="/catalogo" class="nav-link">Catálogo</a>
                <a href="/guia-rostros" class="nav-link">Guía de Rostros</a>
            </div>
            <a href="/analisis" class="btn btn-primary btn-sm">Comenzar Análisis</a>
        </div>
    </nav>

    <!-- Contenido -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <p>&copy; 2025 OptiMatch — Sistema de Recomendación de Lentes</p>
            <p>Tecnologías: OpenCV · MediaPipe · FastAPI</p>
        </div>
    </footer>

    <!-- App JS -->
    <script src="/static/js/app.js"></script>

    <!-- Iconos Lucide (debe cargar antes que los scripts de cada página) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Scripts de cada template -->
    {% block scripts %}{% endblock %}

    <!-- Renderizar todos los <i data-lucide> como SVG (una vez que el DOM y los templates se cargaron) -->
    <script>
        if (window.lucide) lucide.createIcons();
    </script>
</body>
</html>
